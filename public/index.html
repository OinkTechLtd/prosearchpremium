<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProPoisk Premium</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="cookieBanner" class="cookie-banner hidden">
      <p>
        Мы используем cookies и технические данные для улучшения сервиса ProPoisk Premium.
      </p>
      <button id="acceptCookies" class="btn primary">Принять</button>
    </div>

    <header class="topbar">
      <div class="brand">ProPoisk <span>Premium</span></div>
      <nav class="menu" id="servicesMenu"></nav>
      <div class="top-actions">
        <button class="btn" id="openProfile">Профиль</button>
        <button class="btn" id="toggleIncognito">Инкогнито</button>
      </div>
    </header>

    <main class="container">
      <section class="search-panel">
        <div class="tabs">
          <button class="tab active" data-tab="web">Поиск</button>
          <button class="tab" data-tab="images">Картинки</button>
          <button class="tab" data-tab="videos">Видео</button>
        </div>

        <div class="search-row">
          <input id="query" type="text" placeholder="Найдётся всё в ProPoisk" />
          <button id="voiceBtn" class="btn">🎤</button>
          <button id="searchBtn" class="btn primary">Найти</button>
        </div>

        <p class="hint">Источник данных: DuckDuckGo API. Интерфейс вдохновлён ya.ru.</p>
      </section>

      <section id="results" class="results"></section>
    </main>

    <aside class="side-info">
      <a href="/docs/faq.html">FAQ</a>
      <a href="/docs/privacy.html">Политика</a>
      <a href="/docs/terms.html">Условия</a>
      <a href="/oink-id.html">OINK ID</a>
    </aside>

    <div id="overlay" class="overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modalTitle">Mini App</h3>
          <button id="closeModal" class="btn">Закрыть</button>
        </div>
        <div id="modalContent" class="modal-content"></div>
      </div>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
